<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>部品管理システム（実務・圧縮機能付き）</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f3f6fb;
      color: #333;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1f4e79;
      color: white;
      padding: 18px 16px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .content {
      padding: 20px 16px 100px;
      flex: 1;
    }

    .edit-mode-badge {
      background: #e65100;
      color: white;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 6px;
      margin-bottom: 12px;
      text-align: center;
    }

    .progress {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      height: 100%;
      background: #1f4e79;
      width: 0%;
      transition: 0.3s;
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .subtext {
      font-size: 13px;
      color: #777;
      margin-bottom: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      margin-bottom: 16px;
      background-color: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .photo-preview {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid #ddd;
      display: none;
    }

    .footer {
      position: sticky;
      bottom: 0;
      background: white;
      border-top: 1px solid #ddd;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-back {
      background: #d9e2ec;
      color: #333;
    }

    .btn-next {
      background: #1f4e79;
      color: white;
    }

    .btn-action-group {
      display: flex;
      gap: 6px;
    }

    .btn-edit {
      background: #e2e8f0;
      color: #1f4e79;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      flex: none;
    }

    .btn-danger {
      background: #d32f2f;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      flex: none;
    }

    .hidden {
      display: none;
    }

    .summary-card, .record-card {
      background: #f8fbff;
      border: 1px solid #d7e4f2;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .record-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d7e4f2;
      padding-bottom: 8px;
      margin-bottom: 8px;
    }

    .summary-card p, .record-card p {
      margin: 8px 0;
      font-size: 14px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0 12px;
      color: #1f4e79;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .top-actions button {
      font-size: 14px;
      padding: 12px;
    }

    .btn-secondary {
      background: #5c7c99;
      color: white;
    }

    .success {
      text-align: center;
      padding: 30px 10px;
    }

    .success h2 {
      color: #1f4e79;
      margin-bottom: 10px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    /* ローディング表示用のスタイル */
    .loading-text {
      color: #e65100;
      font-weight: bold;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">部品管理システム</div>

    <div class="content">
      <div id="formScreen">
        <div id="editModeBadge" class="edit-mode-badge hidden">データ修正中</div>
        <div class="progress" id="progressText">1 / 9</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="stepContainer"></div>
      </div>

      <div id="confirmScreen" class="hidden">
        <div class="section-title" id="confirmTitle">入力内容の確認</div>
        <div class="summary-card" id="summaryCard"></div>
      </div>

      <div id="successScreen" class="hidden success">
        <h2 id="successMessageTitle">登録が完了しました</h2>
        <p>部品情報をブラウザに保存しました。</p>
      </div>

      <div id="listScreen" class="hidden">
        <div class="top-actions">
          <button class="btn-next" onclick="restartForm()">新しく登録</button>
          <button class="btn-secondary" onclick="exportCSV()">CSV出力</button>
        </div>
        <div class="section-title">登録済みデータ</div>
        <div id="recordList"></div>
      </div>
    </div>

    <div class="footer" id="footerButtons">
      <button class="btn-back" onclick="prevStep()">戻る</button>
      <button class="btn-next" onclick="nextStep()">次へ</button>
    </div>
  </div>

  <script>
    // マスタデータの定義
    const masterData = {
      siteName: ['大阪第1工場', '大阪第2工場 改修工事', '東京本社ビル', '名古屋物流センター'],
      deviceName: ['制御盤A-01', '動力盤B-02', '空調管理システム', '非常用発電機'],
      partLocation: ['制御盤内部 右上', '電源駆動部', 'メイン基板エリア', '外部配線接続部']
    };

    const steps = [
      { key: 'siteName', label: '現場名を選択してください', type: 'select', options: masterData.siteName },
      { key: 'manager', label: '担当者名を入力してください', type: 'text', placeholder: '例：山田 太郎' },
      { key: 'deviceName', label: '機器名を選択してください', type: 'select', options: masterData.deviceName },
      { key: 'deviceModel', label: '機器の型番を入力してください', type: 'text', placeholder: '例：CP-4500X' },
      { key: 'partName', label: '部品名を入力してください', type: 'text', placeholder: '例：電源ユニット' },
      { key: 'partModel', label: '部品の型番を入力してください', type: 'text', placeholder: '例：PSU-24V-10A' },
      { key: 'partLocation', label: '部品の使用箇所を選択してください', type: 'select', options: masterData.partLocation },
      { key: 'photo', label: '部品の写真を追加してください', type: 'file' },
      { key: 'memo', label: '補足説明があれば入力してください', type: 'textarea', placeholder: '例：交換時は配線色を確認' }
    ];

    let currentStep = 0;
    let formData = {};
    let editIndex = null; // 編集中のインデックス（nullなら新規登録）
    
    // LocalStorageからデータを読み込み
    let records = JSON.parse(localStorage.getItem('parts_records')) || [];

    function renderStep() {
      const step = steps[currentStep];
      const container = document.getElementById('stepContainer');
      const progressText = document.getElementById('progressText');
      const progressFill = document.getElementById('progressFill');
      const editModeBadge = document.getElementById('editModeBadge');

      if (editIndex !== null) {
        editModeBadge.textContent = `登録No.${editIndex + 1} のデータを修正中`;
        editModeBadge.classList.remove('hidden');
      } else {
        editModeBadge.classList.add('hidden');
      }

      progressText.textContent = `${currentStep + 1} / ${steps.length}`;
      progressFill.style.width = `${((currentStep + 1) / steps.length) * 100}%`;

      let inputHTML = '';

      if (step.type === 'select') {
        const isCustom = formData[step.key] && !step.options.includes(formData[step.key]);
        
        inputHTML = `<select id="stepInput" onchange="toggleCustomInput(this)">`;
        inputHTML += `<option value="">-- 選択してください --</option>`;
        step.options.forEach(opt => {
          const selected = formData[step.key] === opt ? 'selected' : '';
          inputHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        inputHTML += `<option value="__custom__" ${isCustom ? 'selected' : ''}>その他（直接入力）</option>`;
        inputHTML += `</select>`;

        inputHTML += `
          <input type="text" id="customInput" class="${isCustom ? '' : 'hidden'}" 
                 placeholder="こちらに直接入力してください" 
                 value="${isCustom ? formData[step.key] : ''}" />
        `;
      } else if (step.type === 'textarea') {
        inputHTML = `
          <textarea id="stepInput" placeholder="${step.placeholder || ''}">${formData[step.key] || ''}</textarea>
        `;
      } else if (step.type === 'file') {
        // capture="environment" を削除し、カメラとフォトライブラリ両方から選べるように変更
        inputHTML = `
          <input type="file" id="stepInput" accept="image/*" />
          <div id="compressStatus" class="small hidden loading-text">写真を圧縮中...</div>
          <img id="photoPreview" class="photo-preview" />
          <div class="small" style="margin-top:8px;">タップすると「カメラで撮影」か「フォトライブラリから選択」を選べます。</div>
        `;
      } else {
        inputHTML = `
          <input type="${step.type}" id="stepInput" placeholder="${step.placeholder || ''}" value="${formData[step.key] || ''}" />
        `;
      }

      container.innerHTML = `
        <div class="question">${step.label}</div>
        <div class="subtext">項目に沿って入力・選択してください</div>
        ${inputHTML}
      `;

      if (step.type === 'file') {
        const input = document.getElementById('stepInput');
        const preview = document.getElementById('photoPreview');
        const status = document.getElementById('compressStatus');

        if (formData.photoPreview) {
          preview.src = formData.photoPreview;
          preview.style.display = 'block';
        }

        input.addEventListener('change', function() {
          const file = this.files[0];
          if (file) {
            formData.photoName = file.name;
            status.classList.remove('hidden'); // 圧縮中メッセージを表示

            const reader = new FileReader();
            reader.onload = function(e) {
              const img = new Image();
              img.onload = function() {
                // 画像自動圧縮ロジック（最大幅800px、画質0.6のJPEGに変換）
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                  height *= MAX_WIDTH / width;
                  width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // 画質を少し落として、容量を極限まで軽量化
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                
                formData.photoPreview = compressedDataUrl;
                preview.src = compressedDataUrl;
                preview.style.display = 'block';
                status.classList.add('hidden'); // 圧縮中メッセージを隠す
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          }
        });
      }

      document.getElementById('footerButtons').classList.remove('hidden');
      document.getElementById('formScreen').classList.remove('hidden');
      document.getElementById('confirmScreen').classList.add('hidden');
      document.getElementById('successScreen').classList.add('hidden');
      document.getElementById('listScreen').classList.add('hidden');
    }

    function toggleCustomInput(selectElem) {
      const customInput = document.getElementById('customInput');
      if (selectElem.value === '__custom__') {
        customInput.classList.remove('hidden');
        customInput.focus();
      } else {
        customInput.classList.add('hidden');
        customInput.value = '';
      }
    }

    function saveCurrentStep() {
      const step = steps[currentStep];
      if (step.type === 'file') return true;

      if (step.type === 'select') {
        const selectValue = document.getElementById('stepInput').value;
        if (selectValue === '__custom__') {
          formData[step.key] = document.getElementById('customInput').value.trim();
        } else {
          formData[step.key] = selectValue;
        }
      } else {
        formData[step.key] = document.getElementById('stepInput').value.trim();
      }

      return formData[step.key] !== '' || step.key === 'memo';
    }

    function nextStep() {
      const step = steps[currentStep];

      if (step.type !== 'file') {
        const valid = saveCurrentStep();
        if (!valid) {
          alert('入力または選択をしてください。');
          return;
        }
      }

      if (step.type === 'file' && !formData.photoPreview) {
        alert('写真を追加してください。');
        return;
      }

      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
      } else {
        showConfirm();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        if (steps[currentStep].type !== 'file') saveCurrentStep();
        currentStep--;
        renderStep();
      }
    }

    function showConfirm() {
      if (steps[currentStep].type !== 'file') saveCurrentStep();

      document.getElementById('formScreen').classList.add('hidden');
      document.getElementById('confirmScreen').classList.remove('hidden');
      document.getElementById('successScreen').classList.add('hidden');
      document.getElementById('listScreen').classList.add('hidden');

      const titleElem = document.getElementById('confirmTitle');
      titleElem.textContent = editIndex !== null ? `修正内容の確認 (No.${editIndex + 1})` : "入力内容の確認";

      document.getElementById('summaryCard').innerHTML = `
        <p><strong>現場名：</strong>${formData.siteName || ''}</p>
        <p><strong>担当者：</strong>${formData.manager || ''}</p>
        <p><strong>機器名：</strong>${formData.deviceName || ''}</p>
        <p><strong>機器型番：</strong>${formData.deviceModel || ''}</p>
        <p><strong>部品名：</strong>${formData.partName || ''}</p>
        <p><strong>部品型番：</strong>${formData.partModel || ''}</p>
        <p><strong>使用箇所：</strong>${formData.partLocation || ''}</p>
        <p><strong>補足説明：</strong>${formData.memo || ''}</p>
        ${formData.photoPreview ? `<img src="${formData.photoPreview}" class="photo-preview" style="display:block;" />` : ''}
      `;

      const submitText = editIndex !== null ? '更新する（上書き）' : '登録する';
      document.getElementById('footerButtons').innerHTML = `
        <button class="btn-back" onclick="editAgain()">修正する</button>
        <button class="btn-next" onclick="submitForm()">${submitText}</button>
      `;
    }

    function editAgain() {
      document.getElementById('footerButtons').innerHTML = `
        <button class="btn-back" onclick="prevStep()">戻る</button>
        <button class="btn-next" onclick="nextStep()">次へ</button>
      `;
      renderStep();
    }

    function submitForm() {
      const dataToSave = {
        siteName: formData.siteName || '',
        manager: formData.manager || '',
        deviceName: formData.deviceName || '',
        deviceModel: formData.deviceModel || '',
        partName: formData.partName || '',
        partModel: formData.partModel || '',
        partLocation: formData.partLocation || '',
        memo: formData.memo || '',
        photoName: formData.photoName || '',
        photoPreview: formData.photoPreview || ''
      };

      const successTitleElem = document.getElementById('successMessageTitle');

      try {
        if (editIndex !== null) {
          records[editIndex] = dataToSave;
          successTitleElem.textContent = "変更を保存（上書き）しました";
        } else {
          records.push(dataToSave);
          successTitleElem.textContent = "登録が完了しました";
        }

        // LocalStorageにデータを保存
        localStorage.setItem('parts_records', JSON.stringify(records));

        document.getElementById('confirmScreen').classList.add('hidden');
        document.getElementById('successScreen').classList.remove('hidden');
        document.getElementById('footerButtons').innerHTML = `
          <button class="btn-next" onclick="showList()">登録一覧を見る</button>
        `;
      } catch (e) {
        alert("エラー：保存に失敗しました。データ容量がブラウザの上限を超えています。古いデータを削除するかキャッシュをクリアしてください。");
        console.error(e);
      }
    }

    function showList() {
      editIndex = null; // 状態クリア
      document.getElementById('formScreen').classList.add('hidden');
      document.getElementById('confirmScreen').classList.add('hidden');
      document.getElementById('successScreen').classList.add('hidden');
      document.getElementById('listScreen').classList.remove('hidden');
      document.getElementById('footerButtons').classList.add('hidden');

      const recordList = document.getElementById('recordList');
      recordList.innerHTML = '';

      if (records.length === 0) {
        recordList.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">登録されたデータはありません。</p>';
        return;
      }

      records.forEach((r, index) => {
        const card = document.createElement('div');
        card.className = 'record-card';
        card.innerHTML = `
          <div class="record-card-header">
            <strong>登録No：${index + 1}</strong>
            <div class="btn-action-group">
              <button class="btn-edit" onclick="startEdit(${index})">編集</button>
              <button class="btn-danger" onclick="deleteRecord(${index})">削除</button>
            </div>
          </div>
          <p><strong>現場名：</strong>${r.siteName}</p>
          <p><strong>担当者：</strong>${r.manager}</p>
          <p><strong>機器名：</strong>${r.deviceName}</p>
          <p><strong>機器型番：</strong>${r.deviceModel}</p>
          <p><strong>部品名：</strong>${r.partName}</p>
          <p><strong>部品型番：</strong>${r.partModel}</p>
          <p><strong>使用箇所：</strong>${r.partLocation}</p>
          <p><strong>補足説明：</strong>${r.memo}</p>
          ${r.photoPreview ? `<img src="${r.photoPreview}" class="photo-preview" style="display:block;" />` : ''}
        `;
        recordList.appendChild(card);
      });
    }

    // 過去データの編集を開始する関数
    function startEdit(index) {
      editIndex = index;
      // 過去データをformDataにコピーして復元
      formData = JSON.parse(JSON.stringify(records[index]));
      currentStep = 0;

      document.getElementById('footerButtons').classList.remove('hidden');
      document.getElementById('footerButtons').innerHTML = `
        <button class="btn-back" onclick="prevStep()">戻る</button>
        <button class="btn-next" onclick="nextStep()">次へ</button>
      `;

      renderStep();
    }

    function deleteRecord(index) {
      if (confirm(`登録No.${index + 1} のデータを削除してもよろしいですか？`)) {
        records.splice(index, 1);
        localStorage.setItem('parts_records', JSON.stringify(records));
        showList();
      }
    }

    function restartForm() {
      currentStep = 0;
      formData = {};
      editIndex = null;

      document.getElementById('footerButtons').classList.remove('hidden');
      document.getElementById('footerButtons').innerHTML = `
        <button class="btn-back" onclick="prevStep()">戻る</button>
        <button class="btn-next" onclick="nextStep()">次へ</button>
      `;

      renderStep();
    }

    function exportCSV() {
      if (records.length === 0) {
        alert('出力するデータがありません。');
        return;
      }

      const headers = ['現場名', '担当者', '機器名', '機器型番', '部品名', '部品型番', '使用箇所', '補足説明', '写真ファイル名'];
      const rows = records.map(r => [
        r.siteName,
        r.manager,
        r.deviceName,
        r.deviceModel,
        r.partName,
        r.partModel,
        r.partLocation,
        r.memo,
        r.photoName
      ]);

      let csvContent = '\uFEFF' + headers.join(',') + '\n';
      rows.forEach(row => {
        csvContent += row.map(value => `"${value.replace(/"/g, '""')}"`).join(',') + '\n';
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', '部品管理データ.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 初期起動時の制御
    if (records.length > 0) {
      showList();
    } else {
      renderStep();
    }
  </script>
</body>
</html>
